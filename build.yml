name: Build Tawdhif APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Android Project
      run: |
        mkdir -p app/src/main/java/dz/tawdhif/app
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/assets

    - name: Download HTML from ZIP
      run: |
        find . -name "*.zip" -exec unzip -o {} \; 2>/dev/null || true
        find . -name "index.html" -o -name "tawdhif-app.html" | head -1 | xargs -I{} cp {} app/src/main/assets/index.html 2>/dev/null || true
        if [ ! -f app/src/main/assets/index.html ]; then
          echo "<html><body><h1>تَوظِيف</h1></body></html>" > app/src/main/assets/index.html
        fi

    - name: Create AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="dz.tawdhif.app">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
                android:allowBackup="true"
                android:label="تَوظِيف"
                android:usesCleartextTraffic="true"
                android:hardwareAccelerated="true"
                android:supportsRtl="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:screenOrientation="portrait">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Create MainActivity.java
      run: |
        cat > app/src/main/java/dz/tawdhif/app/MainActivity.java << 'EOF'
        package dz.tawdhif.app;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        public class MainActivity extends Activity {
            WebView w;
            protected void onCreate(Bundle b) {
                super.onCreate(b);
                w = new WebView(this);
                WebSettings s = w.getSettings();
                s.setJavaScriptEnabled(true);
                s.setDomStorageEnabled(true);
                s.setAllowFileAccess(true);
                s.setAllowUniversalAccessFromFileURLs(true);
                w.setWebViewClient(new WebViewClient());
                setContentView(w);
                w.loadUrl("file:///android_asset/index.html");
            }
            public void onBackPressed() {
                if (w.canGoBack()) w.goBack();
                else super.onBackPressed();
            }
        }
        EOF

    - name: Create strings.xml
      run: |
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">تَوظِيف</string>
        </resources>
        EOF

    - name: Create app build.gradle
      run: |
        cat > app/build.gradle << 'EOF'
        plugins { id 'com.android.application' }
        android {
            namespace 'dz.tawdhif.app'
            compileSdk 34
            defaultConfig {
                applicationId "dz.tawdhif.app"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release { minifyEnabled false }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_11
                targetCompatibility JavaVersion.VERSION_11
            }
            aaptOptions {
                noCompress 'html', 'js', 'css'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

    - name: Create root build.gradle
      run: |
        cat > build.gradle << 'EOF'
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        EOF

    - name: Create settings.gradle
      run: |
        cat > settings.gradle << 'EOF'
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "tawdhif"
        include ':app'
        EOF

    - name: Create gradle wrapper
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK
      run: |
        gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tawdhif-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
